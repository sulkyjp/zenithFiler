name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: |
          dotnet restore ZenithFiler.csproj
          dotnet restore ZenithDocViewer/ZenithDocViewer.csproj

      - name: Publish
        run: dotnet publish ZenithFiler.csproj -c Release -r win-x64 --self-contained -o publish

      - name: Create ZIP
        shell: pwsh
        run: Compress-Archive -Path "publish\*" -DestinationPath "ZenithFiler_v${{ steps.version.outputs.VERSION }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ZenithFiler_v${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true
